<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercado Esportivo — Contas</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f12;
  --surface: #141719;
  --surface2: #1c1f23;
  --border: #252a2f;
  --accent: #00e5a0;
  --accent2: #00b37a;
  --warn: #f5c542;
  --danger: #e05252;
  --text: #e8eaed;
  --text2: #8b9199;
  --text3: #555d66;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 14px; }

/* TOPBAR */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.brand { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: .08em; flex: 1; }
.brand span { color: var(--text3); }
.user-pill { font-size: 12px; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; }
.user-pill b { color: var(--text); }
.btn { cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn.danger-btn { border-color: var(--danger); color: var(--danger); }
.btn.danger-btn:hover { background: var(--danger); color: #fff; }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 16px; padding: 4px 6px; border-radius: 4px; transition: color .15s; }
.btn-icon:hover { color: var(--accent); }

/* STATS */
.stats-bar {
  display: flex; gap: 8px; padding: 14px 24px; flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; min-width: 140px; }
.stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.stat-val { font-family: var(--mono); font-size: 18px; color: var(--accent); font-weight: 700; }
.stat-val.warn { color: var(--warn); }
.stat-val.danger { color: var(--danger); }

/* TOOLBAR */
.toolbar {
  display: flex; align-items: center; gap: 10px; padding: 12px 24px;
  border-bottom: 1px solid var(--border);
}
.search-wrap { position: relative; flex: 1; max-width: 280px; }
.search-wrap input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 7px 12px 7px 34px; border-radius: 6px;
  font-family: var(--sans); font-size: 13px; outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
select.filter-sel {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
  padding: 7px 10px; border-radius: 6px; font-family: var(--sans); font-size: 13px;
  outline: none; cursor: pointer;
}
select.filter-sel:focus { border-color: var(--accent); }

/* MAIN */
.main { padding: 20px 24px; }

/* GROUP */
.group-block { margin-bottom: 28px; }
.group-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.group-name { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); }
.group-count { font-size: 11px; color: var(--text3); }
.group-add { font-size: 11px; color: var(--text3); cursor: pointer; margin-left: auto; }
.group-add:hover { color: var(--accent); }

/* TABLE */
.contas-table { width: 100%; border-collapse: collapse; }
.contas-table th {
  text-align: left; font-size: 11px; font-weight: 500;
  color: var(--text3); text-transform: uppercase; letter-spacing: .06em;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
}
.conta-row {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  cursor: grab;
}
.conta-row:hover { background: var(--surface2); }
.conta-row.dragging { opacity: .4; }
.conta-row.drag-over { border-top: 2px solid var(--accent); }
.conta-row td { padding: 9px 10px; vertical-align: middle; }
.drag-handle { color: var(--text3); font-size: 14px; cursor: grab; user-select: none; }
.drag-handle:active { cursor: grabbing; }

/* Situação badge */
.badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 20px; letter-spacing: .04em; text-transform: uppercase;
}
.badge.ativa { background: rgba(0,229,160,.12); color: var(--accent); border: 1px solid rgba(0,229,160,.25); }
.badge.acao { background: rgba(245,197,66,.12); color: var(--warn); border: 1px solid rgba(245,197,66,.25); }
.badge.inativa, .badge.limitada { background: rgba(224,82,82,.12); color: var(--danger); border: 1px solid rgba(224,82,82,.2); }

.saldo-val { font-family: var(--mono); font-size: 13px; }
.saldo-val.pos { color: var(--accent); }
.saldo-val.neg { color: var(--danger); }
.saldo-val.zero { color: var(--text3); }

.pwd-wrap { display: flex; align-items: center; gap: 6px; }
.pwd-dots { font-family: var(--mono); font-size: 12px; color: var(--text3); letter-spacing: 2px; }
.eye-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 13px; }
.eye-btn:hover { color: var(--accent); }
.copyable { transition: color 0.15s, background 0.15s; border-radius: 3px; padding: 2px 4px; }
.copyable:hover { color: var(--accent) !important; background: rgba(255,255,255,0.04); }
.copyable:active { background: rgba(255,255,255,0.1); }

.actions { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
.conta-row:hover .actions { opacity: 1; }

/* EMPTY GROUP */
.empty-group { padding: 16px 10px; color: var(--text3); font-size: 13px; font-style: italic; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.modal-title { font-family: var(--mono); font-size: 14px; color: var(--accent); margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-row.single { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: 6px; font-family: var(--sans); font-size: 13px; outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 70px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

/* HIST MODAL */
.hist-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.hist-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
.hist-meta { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.hist-change { font-size: 13px; }
.hist-old { color: var(--danger); text-decoration: line-through; }
.hist-new { color: var(--accent); }

/* LOGIN */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
.login-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 40px; width: 340px; text-align: center;
}
.login-brand { font-family: var(--mono); font-size: 15px; color: var(--accent); margin-bottom: 8px; letter-spacing: .08em; }
.login-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
.login-box input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px; border-radius: 6px; margin-bottom: 10px;
  font-family: var(--sans); font-size: 14px; outline: none; text-align: left;
}
.login-box input:focus { border-color: var(--accent); }
.login-err { color: var(--danger); font-size: 12px; margin-bottom: 8px; min-height: 16px; }
#app-screen { display: none; }

/* CLICKABLE STATS */
.stat-clickable { cursor: pointer; transition: all .15s; }
.stat-clickable:hover { border-color: var(--text2); }
.stat-clickable.active { border-color: var(--accent) !important; }
#card-ativa.active  { border-color: var(--accent) !important; background: rgba(0,229,160,.08); }
#card-acao.active   { border-color: var(--warn) !important; background: rgba(245,197,66,.08); }
#card-inativa.active { border-color: var(--danger) !important; background: rgba(224,82,82,.08); }
#card-todas.active  { border-color: var(--text2) !important; }

/* GROUP PILLS (inline in stats bar) */
.grp-pill {
  cursor: pointer; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; transition: all .15s;
  display: flex; flex-direction: column; gap: 2px; min-width: 90px;
  position: relative;
}
.grp-pill[draggable="true"] { cursor: grab; }
.grp-pill[draggable="true"]:active { cursor: grabbing; }
.grp-pill:hover { border-color: var(--text2); }
.grp-pill.active { border-color: var(--accent); background: rgba(0,229,160,.08); }
.grp-pill-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; font-family: var(--mono); }
.grp-pill-count { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text); }
.grp-pill.active .grp-pill-count { color: var(--accent); }
.grp-pill.active .grp-pill-label { color: var(--accent2); }
.grp-pill-x {
  position: absolute; top: 4px; right: 4px;
  width: 16px; height: 16px; border-radius: 4px;
  display: none; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1; color: var(--text3);
  background: var(--surface3, rgba(255,255,255,0.05));
  cursor: pointer;
}
.grp-pill:hover .grp-pill-x { display: flex; }
.grp-pill-x:hover { background: var(--danger, #e85a6e); color: #fff; }
.grp-pill-add {
  align-items: center; justify-content: center;
  font-size: 22px; color: var(--text3);
  min-width: 50px; min-height: 100%;
  border-style: dashed;
}
.grp-pill-add:hover { color: var(--accent); border-color: var(--accent); }

/* SIT FILTER BUTTONS */
.sit-filters { display:flex; gap:6px; align-items:center; }
.sit-btn {
  cursor:pointer; font-family:var(--sans); font-size:12px; font-weight:600;
  padding:5px 12px; border-radius:20px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text3); transition:all .15s; letter-spacing:.02em;
}
.sit-btn.active-filter { border-color: var(--text2); color: var(--text); }
.sit-btn.sit-ativa.active-filter { background:rgba(0,229,160,.15); border-color:var(--accent); color:var(--accent); }
.sit-btn.sit-acao.active-filter  { background:rgba(245,197,66,.15); border-color:var(--warn); color:var(--warn); }
.sit-btn.sit-inativa.active-filter { background:rgba(224,82,82,.15); border-color:var(--danger); color:var(--danger); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 999;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 18px; font-size: 13px; color: var(--text);
  transform: translateY(80px); opacity: 0; transition: all .25s;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.ok { border-color: var(--accent); color: var(--accent); }
.toast.err { border-color: var(--danger); color: var(--danger); }

/* GRUPO RENAME INPUT */
.group-name-input {
  background: none; border: none; border-bottom: 1px solid var(--accent);
  color: var(--accent); font-family: var(--mono); font-size: 11px;
  letter-spacing: .1em; text-transform: uppercase; outline: none; width: 160px;
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">RM / MERCADO ESPORTIVO</div>
    <div class="login-sub">Dashboard de Contas</div>
    <input id="l-user" placeholder="Usuário" autocomplete="off">
    <input id="l-pass" type="password" placeholder="Senha">
    <div class="login-err" id="l-err"></div>
    <button class="btn primary" style="width:100%;padding:10px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app-screen">
  <div class="topbar">
    <div class="brand">RM <span>/</span> MERCADO ESPORTIVO</div>
    <div class="user-pill">usuário: <b id="disp-user"></b></div>
    <button class="btn primary" onclick="openModal()">+ Nova Conta</button>
    <button class="btn" onclick="doLogout()">Sair</button>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Saldo Total</div>
      <div class="stat-val" id="st-saldo">—</div>
    </div>
    <div class="stat stat-clickable" id="card-todas" onclick="setSitFilter('','todas')" title="Ver todas">
      <div class="stat-label">Total</div>
      <div class="stat-val" id="st-total">—</div>
    </div>
    <div class="stat stat-clickable" id="card-ativa" onclick="setSitFilter('ativa','card-ativa')" title="Filtrar Ativas">
      <div class="stat-label">Ativas</div>
      <div class="stat-val" id="st-ativas">—</div>
    </div>
    <div class="stat stat-clickable" id="card-acao" onclick="setSitFilter('acao','card-acao')" title="Filtrar Ação">
      <div class="stat-label">⚠ Ação</div>
      <div class="stat-val warn" id="st-acao">—</div>
    </div>
    <div class="stat stat-clickable" id="card-inativa" onclick="setSitFilter('inativa','card-inativa')" title="Filtrar Inativas">
      <div class="stat-label">Inativas</div>
      <div class="stat-val danger" id="st-inativas">—</div>
    </div>
    <div style="width:1px;background:var(--border);align-self:stretch;margin:0 4px"></div>
    <div id="group-pills-bar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"></div>
  </div>


  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search-input" placeholder="Buscar conta..." oninput="renderGroups()">
    </div>


  </div>

  <div class="main" id="main-content"></div>
</div>

<!-- MODAL CONTA -->
<div class="overlay" id="modal-conta">
  <div class="modal">
    <div class="modal-title" id="modal-title">NOVA CONTA</div>
    <input type="hidden" id="f-id">
    <div class="form-row">
      <div class="form-group">
        <label>Casa de Aposta *</label>
        <input id="f-casa" placeholder="ex: BET365">
      </div>
      <div class="form-group">
        <label>Grupo</label>
        <input id="f-grupo" list="grupos-datalist" placeholder="ex: Principais, Estrela...">
        <datalist id="grupos-datalist"></datalist>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Agente</label>
        <input id="f-agente" placeholder="Nome do agente">
      </div>
      <div class="form-group">
        <label>Situação</label>
        <input id="f-situacao" placeholder="ex: ATIVA, INATIVA / SMS...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Login</label>
        <input id="f-login" placeholder="Usuário/email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input id="f-senha" placeholder="Senha da conta">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Saldo (R$)</label>
        <input id="f-saldo" type="number" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Observações</label>
        <textarea id="f-obs" placeholder="Notas adicionais..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-conta')">Cancelar</button>
      <button class="btn danger-btn" id="btn-delete" style="display:none" onclick="deleteConta()">Excluir</button>
      <button class="btn primary" onclick="saveConta()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL HISTÓRICO -->
<div class="overlay" id="modal-hist">
  <div class="modal" style="max-width:600px">
    <div class="modal-title">HISTÓRICO — <span id="hist-conta-name"></span></div>
    <div class="hist-list" id="hist-list"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-hist')">Fechar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://yfdrifvhsiumdxgypkjm.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmZHJpZnZoc2l1bWR4Z3lwa2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI4NDgsImV4cCI6MjA5MTUwODg0OH0.nqG8gUePvyR0ZPzx5cmEhi_IKGMZvdNa9r69_XYLcOY';
const SVC_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmZHJpZnZoc2l1bWR4Z3lwa2ptIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTkzMjg0OCwiZXhwIjoyMDkxNTA4ODQ4fQ.s1R7Akclh0LxGkljtHaBHCSJgbU9SFL8pvQArIiXsXQ';
const USERS = { samuel:'officedash', diego:'officedash', amaral:'officedash' };
const DEFAULT_GRUPOS = []; // legacy — não usado mais. Grupos vêm de grupos_contas no Supabase.
const STATUS_LABELS = { ATIVA:'Ativa', ACAO:'Ação', INATIVA:'Inativa', LIMITADA:'Limitada' };

let currentUser = null;
let allContas = [];
let grupos = [];      // ['Principais','Espelho da Estrela', ...]
let dragSrc = null;
let sortCol = ''; let sortDir = 1;

function setSort(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('[id^="sort-"]').forEach(el => el.textContent = '');
  const el = document.getElementById('sort-' + col);
  if (el) el.textContent = sortDir === 1 ? ' ↑' : ' ↓';
  renderGroups();
}
let activeSitFilter = '';

let activeGrpFilter = '';

function setSitFilter(val, cardId) {
  if (activeSitFilter === val) { activeSitFilter = ''; }
  else { activeSitFilter = val; }
  document.querySelectorAll('.stat-clickable').forEach(b => b.classList.remove('active'));
  if (activeSitFilter) {
    const map = {'ativa':'card-ativa','acao':'card-acao','inativa':'card-inativa'};
    const el = document.getElementById(map[activeSitFilter]);
    if (el) el.classList.add('active');
  } else {
    document.getElementById('card-todas')?.classList.add('active');
  }
  renderGroups();
}

function setGrpFilter(val) {
  activeGrpFilter = activeGrpFilter === val ? '' : val;
  renderGrpPills();
  renderGroups();
}

function renderGrpPills() {
  const bar = document.getElementById('group-pills-bar');
  if (!bar) return;
  // Garante OUTRAS BOOKIES no fim (catch-all)
  const ordenados = grupos.filter(g => g !== 'OUTRAS BOOKIES');
  if (grupos.includes('OUTRAS BOOKIES')) ordenados.push('OUTRAS BOOKIES');

  bar.innerHTML = ordenados.map((g, idx) => {
    const cnt = allContas.filter(x=>x.grupo===g).length;
    const isOutras = g === 'OUTRAS BOOKIES';
    const isActive = activeGrpFilter === g;
    return `<div class="grp-pill${isActive?' active':''}"
              draggable="${isOutras?'false':'true'}"
              data-grupo="${esc(g)}"
              ondragstart="grpDragStart(event, '${esc(g).replace(/'/g,"\\'")}')"
              ondragover="event.preventDefault()"
              ondrop="grpDrop(event, '${esc(g).replace(/'/g,"\\'")}')"
              ondblclick="grpEditNome('${esc(g).replace(/'/g,"\\'")}')"
              onclick="if(!event.target.closest('.grp-pill-x')) setGrpFilter('${esc(g).replace(/'/g,"\\'")}')">
      <div class="grp-pill-label">${esc(g)}</div>
      <div class="grp-pill-count">${cnt}</div>
      ${isOutras ? '' : `<div class="grp-pill-x" onclick="event.stopPropagation();grpRemove('${esc(g).replace(/'/g,"\\'")}')" title="Apagar grupo">×</div>`}
    </div>`;
  }).join('') + `<div class="grp-pill grp-pill-add" onclick="grpAddInline()" title="Adicionar grupo">+</div>`;
}

let grpDragSrcName = null;
function grpDragStart(e, nome) {
  grpDragSrcName = nome;
  e.dataTransfer.effectAllowed = 'move';
}
async function grpDrop(e, targetNome) {
  e.preventDefault();
  if (!grpDragSrcName || grpDragSrcName === targetNome) return;
  if (grpDragSrcName === 'OUTRAS BOOKIES' || targetNome === 'OUTRAS BOOKIES') return;
  const srcIdx = grupos.indexOf(grpDragSrcName);
  const tgtIdx = grupos.indexOf(targetNome);
  if (srcIdx < 0 || tgtIdx < 0) return;
  const [moved] = grupos.splice(srcIdx, 1);
  grupos.splice(tgtIdx, 0, moved);
  grpDragSrcName = null;
  renderGrpPills();
  await saveGruposOrdem();
}

async function grpEditNome(atual) {
  if (atual === 'OUTRAS BOOKIES') return;
  const novo = prompt(`Renomear "${atual}":`, atual);
  if (!novo || novo.trim() === '' || novo.trim() === atual) return;
  const novoNome = novo.trim();
  if (grupos.includes(novoNome)) { toast('Já existe um grupo com esse nome', 'err'); return; }
  try {
    // 1. Atualiza nome do grupo na tabela grupos_contas
    const grupoId = _gruposIdMap[atual];
    if (grupoId) await sbPatch(`grupos_contas?id=eq.${grupoId}`, { nome: novoNome });
    _gruposIdMap[novoNome] = grupoId;
    delete _gruposIdMap[atual];

    // 2. Atualiza referências nas contas
    const afetadas = allContas.filter(c => (c.grupo||'OUTRAS BOOKIES') === atual);
    for (const c of afetadas) {
      c.grupo = novoNome;
      await sbPatch(`contas?id=eq.${c.id}`, { grupo: novoNome });
    }
    const idx = grupos.indexOf(atual);
    if (idx >= 0) grupos[idx] = novoNome;
    if (activeGrpFilter === atual) activeGrpFilter = novoNome;
    renderGrpPills();
    populateGrupoSelectInModal();
    toast('Grupo renomeado', 'ok');
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
}

async function grpRemove(g) {
  if (g === 'OUTRAS BOOKIES') return;
  const cnt = allContas.filter(c => (c.grupo||'OUTRAS BOOKIES') === g).length;
  const msg = cnt > 0
    ? `Apagar "${g}"? As ${cnt} contas vão pra OUTRAS BOOKIES.`
    : `Apagar "${g}"?`;
  if (!confirm(msg)) return;
  try {
    // 1. Move contas pra OUTRAS BOOKIES
    const afetadas = allContas.filter(c => (c.grupo||'OUTRAS BOOKIES') === g);
    for (const c of afetadas) {
      c.grupo = 'OUTRAS BOOKIES';
      await sbPatch(`contas?id=eq.${c.id}`, { grupo: 'OUTRAS BOOKIES' });
    }
    // 2. Apaga o registro do grupo
    const grupoId = _gruposIdMap[g];
    if (grupoId) await sbDelete(`grupos_contas?id=eq.${grupoId}`);
    delete _gruposIdMap[g];

    grupos = grupos.filter(x => x !== g);
    if (!grupos.includes('OUTRAS BOOKIES')) grupos.push('OUTRAS BOOKIES');
    if (activeGrpFilter === g) activeGrpFilter = '';
    renderGrpPills(); renderGroups();
    toast('Grupo apagado', 'ok');
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
}

async function grpAddInline() {
  const nome = prompt('Nome do novo grupo:');
  if (!nome || !nome.trim()) return;
  const v = nome.trim();
  if (grupos.includes(v)) { toast('Grupo já existe', 'err'); return; }
  try {
    // Calcula a próxima ordem (última posição antes de OUTRAS BOOKIES)
    const idxOutras = grupos.indexOf('OUTRAS BOOKIES');
    const ordem = idxOutras >= 0 ? idxOutras + 1 : grupos.length + 1;
    const inserted = await sbPostReturn('grupos_contas', { nome: v, ordem: ordem });
    if (inserted && inserted[0]) _gruposIdMap[v] = inserted[0].id;

    if (idxOutras >= 0) grupos.splice(idxOutras, 0, v);
    else grupos.push(v);

    renderGrpPills();
    populateGrupoSelectInModal();
    toast('Grupo adicionado', 'ok');
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
}

// ── STORAGE DE GRUPOS ──────────────────────────────────────────
// ── GRUPOS: CRUD via Supabase ──────────────────────────────────
// Os grupos ficam na tabela grupos_contas (id, nome, ordem). Antes ficavam em localStorage,
// o que causava cada navegador ter sua própria versão. Agora todo mundo vê o mesmo.
let _gruposIdMap = {}; // nome -> id (pra updates/deletes)

async function loadGrupos() {
  // Limpa lixo de versão antiga (grupos no localStorage). Agora vem do Supabase.
  try { localStorage.removeItem('me_grupos'); } catch(e) {}

  try {
    const rows = await sbGet('grupos_contas?select=id,nome,ordem&order=ordem');
    grupos = rows.map(r => r.nome);
    _gruposIdMap = Object.fromEntries(rows.map(r => [r.nome, r.id]));
  } catch(e) {
    console.error('Erro loadGrupos:', e);
    grupos = [];
    _gruposIdMap = {};
  }
  // Garantir que OUTRAS BOOKIES exista e fique sempre por último
  if (!grupos.includes('OUTRAS BOOKIES')) {
    try {
      const inserted = await sbPostReturn('grupos_contas', { nome: 'OUTRAS BOOKIES', ordem: 999 });
      if (inserted && inserted[0]) {
        grupos.push('OUTRAS BOOKIES');
        _gruposIdMap['OUTRAS BOOKIES'] = inserted[0].id;
      }
    } catch(e) { console.error('Erro criando OUTRAS BOOKIES:', e); }
  } else {
    grupos = grupos.filter(g => g !== 'OUTRAS BOOKIES');
    grupos.push('OUTRAS BOOKIES');
  }
}

// Salvar ordem completa (chamado depois de drag-and-drop)
async function saveGruposOrdem() {
  // Re-grava ordem de cada grupo conforme posição no array
  for (let i = 0; i < grupos.length; i++) {
    const nome = grupos[i];
    const id = _gruposIdMap[nome];
    if (!id) continue;
    const novaOrdem = nome === 'OUTRAS BOOKIES' ? 999 : i + 1;
    try {
      await sbPatch(`grupos_contas?id=eq.${id}`, { ordem: novaOrdem });
    } catch(e) { console.error('Erro salvando ordem:', e); }
  }
}

// ── API ─────────────────────────────────────────────────────────
const headers = (write=false) => ({
  'Content-Type':'application/json',
  'apikey': write ? SVC_KEY : ANON_KEY,
  'Authorization': `Bearer ${write ? SVC_KEY : ANON_KEY}`,
  ...(write ? {'Prefer':'return=minimal'} : {})
});
async function sbGet(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { headers: headers() });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(path, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { method:'PATCH', headers: headers(true), body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
}
async function sbPost(path, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { method:'POST', headers: headers(true), body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
}
async function sbPostReturn(path, body) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { method:'POST', headers: { ...headers(true), 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(path) {
  const r = await fetch(`${SUPA_URL}/rest/v1/${path}`, { method:'DELETE', headers: headers(true) });
  if (!r.ok) throw new Error(await r.text());
}

// ── STATS ───────────────────────────────────────────────────────
function brl(v) { return 'R$ ' + Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function normSit(s) { return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function isInativa(s) { const n=normSit(s); return n.includes('INATIVA') || n.includes('LIMITADA'); }
function updateStats(list) {
  const src = list || allContas;
  const ativas   = src.filter(c => normSit(c.situacao) === 'ATIVA');
  const acao     = src.filter(c => { const n=normSit(c.situacao); return !n.includes('INATIVA') && !n.includes('LIMITADA') && n !== 'ATIVA'; });
  const inativas = src.filter(c => isInativa(c.situacao));
  const saldo    = src.reduce((a,c)=>a+(parseFloat(c.saldo)||0),0);
  document.getElementById('st-saldo').textContent    = brl(saldo);
  document.getElementById('st-ativas').textContent   = ativas.length;
  document.getElementById('st-acao').textContent     = acao.length;
  document.getElementById('st-inativas').textContent = inativas.length;
  document.getElementById('st-total').textContent    = src.length;
}

// ── FILTERS ─────────────────────────────────────────────────────
function populateFilters() { renderGrpPills(); }

// ── RENDER ───────────────────────────────────────────────────────
function renderGroups() {
  const search = document.getElementById('search-input').value.toLowerCase();
  // sit filter handled by activeSitFilter
  const filGrp = activeGrpFilter;

  let contas = allContas.filter(c => {
    const matchSearch = !search || [c.casa,c.agente,c.login].some(v=>(v||'').toLowerCase().includes(search));
    const matchSit    = !activeSitFilter || badgeClass(c.situacao) === activeSitFilter;
    const matchGrp    = !filGrp || c.grupo === filGrp;
    return matchSearch && matchSit && matchGrp;
  });

  // Determine which groups to show
  let allGrps;
  if (filGrp) {
    allGrps = [filGrp];
  } else {
    // Show all groups that have matching accounts, em ordem da lista de grupos do Supabase
    const grpsInData = new Set(contas.map(c => c.grupo || 'OUTRAS BOOKIES'));
    allGrps = grupos.filter(g => grpsInData.has(g));
    // Add any extra groups not in current list
    [...grpsInData].filter(g => !grupos.includes(g)).forEach(g => allGrps.push(g));
  }

  const main = document.getElementById('main-content');
  main.innerHTML = '';
  updateStats(contas);

  const tableHeader = `<thead><tr>
    <th style="width:28px"></th>
    <th>Casa</th>
    <th>Agente</th>
    <th>Login</th>
    <th>Senha</th>
    <th class="sortable" onclick="setSort('saldo')" style="cursor:pointer;user-select:none">Saldo <span id="sort-saldo"></span></th>
    <th class="sortable" onclick="setSort('situacao')" style="cursor:pointer;user-select:none">Situação <span id="sort-situacao"></span></th>
    <th class="sortable" onclick="setSort('observacoes')" style="cursor:pointer;user-select:none">Obs <span id="sort-observacoes"></span></th>
    <th></th>
  </tr></thead>`;

  function sortContas(list) {
    if (!sortCol) return list;
    return [...list].sort((a,b) => {
      let av = a[sortCol]||'', bv = b[sortCol]||'';
      if (sortCol==='saldo') { av=parseFloat(av)||0; bv=parseFloat(bv)||0; }
      else { av=String(av).toLowerCase(); bv=String(bv).toLowerCase(); }
      return av>bv ? sortDir : av<bv ? -sortDir : 0;
    });
  }

  if (!filGrp) {
    // Flat list — sem cabeçalho de grupo
    const sorted = sortContas(contas);
    const block = document.createElement('div');
    block.className = 'group-block';
    block.innerHTML = `<table class="contas-table">${tableHeader}<tbody id="tbody-flat"></tbody></table>`;
    main.appendChild(block);
    const tbody = block.querySelector('tbody');
    sorted.forEach(c => tbody.appendChild(makeRow(c)));
    setupDrop(tbody);
  } else {
    // Por grupo — mostra cabeçalho
    allGrps.forEach(grp => {
      let grpContas = sortContas(contas.filter(c=>(c.grupo||'OUTRAS BOOKIES')===grp));
      if (!grpContas.length) return;

      const block = document.createElement('div');
      block.className = 'group-block';
      block.dataset.grupo = grp;
      block.innerHTML = `
        <div class="group-header">
          <span class="group-name">${esc(grp)}</span>
          <span class="group-count">${grpContas.length} conta${grpContas.length!==1?'s':''}</span>
        </div>
        <table class="contas-table">${tableHeader}<tbody id="tbody-${grp.replace(/\s+/g,'_')}"></tbody></table>`;
      main.appendChild(block);

      const tbody = block.querySelector('tbody');
      grpContas.forEach(c => tbody.appendChild(makeRow(c)));
      setupDrop(tbody);
    });
  }
}

function badgeClass(s) {
  const n = normSit(s);
  if (n.includes('INATIVA') || n.includes('LIMITADA')) return 'inativa';
  if (n === 'ATIVA') return 'ativa';
  return 'acao'; // tudo mais = ação necessária (amarelo)
}
function badgeLabel(s) { return s || '—'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function makeRow(c) {
  const tr = document.createElement('tr');
  tr.className = 'conta-row';
  tr.dataset.id = c.id;
  tr.draggable = true;

  const sval = parseFloat(c.saldo)||0;
  const scls = sval > 0 ? 'pos' : sval < 0 ? 'neg' : 'zero';

  tr.innerHTML = `
    <td><span class="drag-handle" title="Arrastar">⠿</span></td>
    <td><b>${esc(c.casa)}</b></td>
    <td style="color:var(--text2)">${esc(c.agente||'')}</td>
    <td><span class="copyable" style="color:var(--text2);font-family:var(--mono);font-size:12px;cursor:pointer" title="Clique para copiar" onclick="copyTxt(event, ${JSON.stringify(c.login||'').replace(/"/g,'&quot;')})">${esc(c.login||'')}</span></td>
    <td>
      <div class="pwd-wrap">
        <span class="pwd-dots copyable" id="pwd-${c.id}" style="cursor:pointer" title="Clique para copiar" onclick="copyTxt(event, ${JSON.stringify(c.senha||'').replace(/"/g,'&quot;')})">••••••</span>
        <button class="eye-btn" onclick="togglePwd('${c.id}','${esc(c.senha||'')}')">👁</button>
      </div>
    </td>
    <td><span class="saldo-val ${scls}" style="cursor:pointer" title="Clique para editar" onclick="editSaldo(this,'${c.id}',${sval})">${brl(c.saldo)}</span></td>
    <td><span class="badge ${badgeClass(c.situacao)}" style="cursor:pointer" title="Clique para editar" onclick="editSituacao(this,'${c.id}','${esc(c.situacao||'')}')">${badgeLabel(c.situacao)}</span></td>
    <td class="obs-cell" style="color:var(--text3);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" title="Clique para editar" data-id="${c.id}" data-obs="${esc(c.observacoes||'')}"><span>${esc(c.observacoes||'')}</span></td>
    <td>
      <div class="actions">
        <button class="btn-icon" title="Editar" onclick="editConta('${c.id}')">✏️</button>
        <button class="btn-icon" title="Histórico" onclick="showHist('${c.id}','${esc(c.casa)}')">📋</button>
        <button class="btn-icon" title="Excluir" onclick="confirmDelete('${c.id}','${esc(c.casa)}')">🗑</button>
      </div>
    </td>`;

  // Drag events
  tr.addEventListener('dragstart', e => { dragSrc = tr; tr.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  tr.addEventListener('dragend', () => { tr.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); });
  tr.addEventListener('dragover', e => { e.preventDefault(); tr.classList.add('drag-over'); });
  tr.addEventListener('dragleave', () => tr.classList.remove('drag-over'));
  tr.addEventListener('drop', e => { e.preventDefault(); handleDrop(tr); });

  // obs inline edit via delegation
  const obsTd = tr.querySelector('.obs-cell');
  if (obsTd) {
    obsTd.addEventListener('click', () => {
      editObs(obsTd, obsTd.dataset.id, obsTd.dataset.obs || '');
    });
  }

  return tr;
}

// ── DRAG & DROP ─────────────────────────────────────────────────
function setupDrop(tbody) {
  tbody.addEventListener('dragover', e => e.preventDefault());
  tbody.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrc && tbody !== dragSrc.closest('tbody')) {
      // Drop onto empty tbody
      const newGrp = tbody.closest('.group-block')?.dataset.grupo || 'Sem Grupo';
      handleDropToGroup(newGrp);
    }
  });
}

async function handleDrop(targetRow) {
  if (!dragSrc || dragSrc === targetRow) return;
  const newGrp = targetRow.closest('.group-block')?.dataset.grupo || 'Sem Grupo';
  const srcId  = dragSrc.dataset.id;
  const tgtId  = targetRow.dataset.id;

  // Update grupo if different
  const srcConta = allContas.find(c=>c.id===srcId);
  if (srcConta) srcConta.grupo = newGrp;

  // Reorder within group: insert srcConta before targetConta
  const grpContas = allContas.filter(c=>(c.grupo||'OUTRAS BOOKIES')===newGrp);
  const others    = allContas.filter(c=>(c.grupo||'OUTRAS BOOKIES')!==newGrp);

  const srcIdx = grpContas.findIndex(c=>c.id===srcId);
  const tgtIdx = grpContas.findIndex(c=>c.id===tgtId);

  // Remove src from original position
  const [moved] = srcIdx>=0 ? grpContas.splice(srcIdx,1) : [srcConta];
  // Find new tgt idx after removal
  const newTgtIdx = grpContas.findIndex(c=>c.id===tgtId);
  grpContas.splice(newTgtIdx>=0 ? newTgtIdx : grpContas.length, 0, moved);

  // Reassign ordem
  grpContas.forEach((c,i) => c.ordem = i);
  allContas.length = 0;
  allContas.push(...others, ...grpContas);

  renderGroups();
  await saveOrdem(grpContas, srcId, newGrp);
}

async function handleDropToGroup(newGrp) {
  if (!dragSrc) return;
  const srcId   = dragSrc.dataset.id;
  const srcConta = allContas.find(c=>c.id===srcId);
  if (!srcConta || srcConta.grupo === newGrp) return;
  srcConta.grupo = newGrp;
  renderGroups();
  await saveOrdem([srcConta], srcId, newGrp);
}

async function saveOrdem(grpContas, mainId, newGrp) {
  try {
    for (const c of grpContas) {
      await sbPatch(`contas?id=eq.${c.id}`, { ordem: c.ordem, grupo: c.grupo || 'Sem Grupo' });
    }
    // Log history for grupo change
    const srcConta = allContas.find(c=>c.id===mainId);
    if (srcConta) {
      await sbPost('historico_contas', {
        conta_id: mainId, campo_alterado: 'grupo',
        valor_anterior: '—', valor_novo: newGrp,
        alterado_por: currentUser
      });
    }
  } catch(e) { toast('Erro ao salvar ordem: ' + e.message, 'err'); }
}

document.querySelectorAll('.overlay').forEach(el => {

async function saveConta() {
  const id = document.getElementById('f-id').value;
  const body = {
    casa:        document.getElementById('f-casa').value.trim().toUpperCase(),
    agente:      document.getElementById('f-agente').value.trim(),
    situacao:    document.getElementById('f-situacao').value,
    login:       document.getElementById('f-login').value.trim(),
    senha:       document.getElementById('f-senha').value.trim(),
    saldo:       parseFloat(document.getElementById('f-saldo').value)||0,
    observacoes: document.getElementById('f-obs').value.trim(),
    grupo:       document.getElementById('f-grupo').value.trim(),
    atualizado_em:  new Date().toISOString(),
    atualizado_por: currentUser,
  };
  if (!body.casa) { toast('Informe a casa de aposta', 'err'); return; }
  try {
    if (id) {
      const old = allContas.find(c=>c.id===id)||{};
      await sbPatch(`contas?id=eq.${id}`, body);
      // Log changes
      for (const k of ['casa','agente','situacao','login','senha','saldo','observacoes','grupo']) {
        if (String(old[k]||'') !== String(body[k]||'')) {
          await sbPost('historico_contas', {
            conta_id:id, campo_alterado:k,
            valor_anterior:String(old[k]||''), valor_novo:String(body[k]||''),
            alterado_por:currentUser
          });
        }
      }
      Object.assign(old, body);
    } else {
      body.ordem = allContas.length;
      const r = await fetch(`${SUPA_URL}/rest/v1/contas`, {
        method:'POST', headers:{...headers(true),'Prefer':'return=representation'},
        body:JSON.stringify(body)
      });
      const [nc] = await r.json();
      allContas.push(nc);
    }
    closeModal('modal-conta');
    populateFilters(); renderGroups();
    toast('Conta salva!', 'ok');
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
}

async function confirmDelete(id, casa) {
  if (!confirm(`Excluir a conta "${casa}" permanentemente?`)) return;
  try {
    await sbDelete(`contas?id=eq.${id}`);
    allContas = allContas.filter(c=>c.id!==id);
    populateFilters(); renderGroups();
    toast('Conta excluída', 'ok');
  } catch(e) { toast('Erro: ' + e.message, 'err'); }
}

// ── HISTÓRICO ────────────────────────────────────────────────────
async function showHist(id, casa) {
  document.getElementById('hist-conta-name').textContent = casa;
  document.getElementById('hist-list').innerHTML = '<div style="color:var(--text3)">Carregando...</div>';
  document.getElementById('modal-hist').classList.add('open');
  try {
    const rows = await sbGet(`historico_contas?conta_id=eq.${id}&order=alterado_em.desc&limit=50`);
    const list = document.getElementById('hist-list');
    if (!rows.length) { list.innerHTML='<div style="color:var(--text3)">Sem histórico.</div>'; return; }
    list.innerHTML = rows.map(r=>`
      <div class="hist-item">
        <div class="hist-meta">${r.alterado_por||'—'} · ${new Date(r.alterado_em).toLocaleString('pt-BR')}</div>
        <div class="hist-change"><b>${r.campo_alterado}</b>: <span class="hist-old">${esc(r.valor_anterior||'')}</span> → <span class="hist-new">${esc(r.valor_novo||'')}</span></div>
      </div>`).join('');
  } catch(e) { document.getElementById('hist-list').innerHTML=`<div style="color:var(--danger)">${e.message}</div>`; }
}

function populateGrupoSelectInModal() {
  const dl = document.getElementById('grupos-datalist');

  dl.innerHTML='';
  grupos.forEach(g=>{ const o=document.createElement('option'); o.value=g; dl.appendChild(o); });

// ── INLINE EDIT ──────────────────────────────────────────────────
function editSituacao(el, id, cur) {
  const inp = document.createElement('input');
  inp.value = cur;
  inp.style.cssText = 'background:var(--surface2);border:1px solid var(--accent);color:var(--text);padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;width:110px;outline:none;font-family:var(--sans)';
  el.replaceWith(inp);
  inp.focus(); inp.select();

  async function commit() {
    const val = inp.value.trim() || cur;
    const conta = allContas.find(c=>c.id===id);
    if (conta && val !== cur) {
      try {
        await sbPatch(`contas?id=eq.${id}`, { situacao: val, atualizado_em: new Date().toISOString(), atualizado_por: currentUser });
        await sbPost('historico_contas', { conta_id:id, campo_alterado:'situacao', valor_anterior:cur, valor_novo:val, alterado_por:currentUser });
        conta.situacao = val;
        renderGroups();
        toast('Situação atualizada', 'ok');
      } catch(e) { toast('Erro: '+e.message,'err'); renderGroups(); }
    } else { renderGroups(); }
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); if(e.key==='Escape') { inp.value=cur; inp.blur(); } });
}

// ── UTILS ─────────────────────────────────────────────────────────
function togglePwd(id, val) {
  event.stopPropagation();
  const el = document.getElementById('pwd-'+id);
  el.textContent = el.textContent==='••••••' ? val : '••••••';
}

function copyTxt(e, val) {
  e.stopPropagation();
  if (!val) { toast('Vazio', 'err'); return; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(val).then(
      () => toast('Copiado!', 'ok'),
      () => fallbackCopy(val)
    );
  } else {
    fallbackCopy(val);
  }
}

function fallbackCopy(val) {
  const ta = document.createElement('textarea');
  ta.value = val; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); toast('Copiado!', 'ok'); }
  catch(e) { toast('Erro ao copiar', 'err'); }
  document.body.removeChild(ta);
}

let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.className='toast', 3000);
}
